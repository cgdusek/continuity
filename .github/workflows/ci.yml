name: ci

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      level:
        description: "Choose which CI lane to run"
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full
          - both

env:
  CI_RUNNER: ubuntu-24.04
  NODE_VERSION_PRIMARY: "22"
  NODE_VERSION_MATRIX: '["22","24"]'
  PNPM_VERSION: "10.23.0"

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  smoke-build:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.level == 'smoke' || inputs.level == 'both')
    name: smoke / build + typecheck
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck

  smoke-unit:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.level == 'smoke' || inputs.level == 'both')
    name: smoke / unit
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test:unit

  smoke-e2e:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.level == 'smoke' || inputs.level == 'both')
    name: smoke / packaged integration smoke
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Run packaged integration smoke
        run: pnpm test:e2e

  full-verify:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.level == 'full' || inputs.level == 'both'))
    name: full / verify / node ${{ matrix.node }}
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(env.NODE_VERSION_MATRIX) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test:unit

  full-coverage:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.level == 'full' || inputs.level == 'both'))
    name: full / coverage (node 22)
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run coverage gate
        run: pnpm test:coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-22
          path: coverage/
          if-no-files-found: error
          retention-days: 14

  full-e2e:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.level == 'full' || inputs.level == 'both'))
    name: full / packaged integration smoke
    runs-on: ${{ env.CI_RUNNER }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Run packaged integration smoke
        run: pnpm test:e2e
